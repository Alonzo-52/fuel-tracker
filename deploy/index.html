<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Pulse UK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-card: rgba(30,30,46,0.9);
            --text-primary: #f0f6fc;
            --text-secondary: #a1a1aa;
            --accent: #f97316;
            --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; padding: 30px 20px; }
        header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), #fdba74); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-secondary); }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--bg-card); padding: 6px; border-radius: 14px; border: 1px solid #3f3f46; }
        .mode-tab { flex: 1; padding: 14px; border: none; background: transparent; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; cursor: pointer; border-radius: 10px; transition: all 0.3s; }
        .mode-tab.active { background: linear-gradient(135deg, var(--accent), #ea580c); color: white; }
        .input-section { background: var(--bg-card); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 120px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 14px; border: 1px solid #3f3f46; border-radius: 10px; font-size: 1rem; background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, var(--accent), #ea580c); color: white; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .status { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 20px; display: none; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .status.show { display: flex; }
        .status.error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
        .status.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #86efac; }
        .results-section { display: none; }
        .results-section.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .route-viz { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: none; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .route-viz.show { display: block; }
        .route-line { display: flex; align-items: center; justify-content: center; gap: 16px; font-weight: 600; flex-wrap: wrap; }
        .route-point { background: linear-gradient(135deg, var(--accent), #ea580c); padding: 12px 24px; border-radius: 10px; }
        .route-arrow { color: var(--accent); font-size: 1.4rem; }
        .route-stats { display: flex; justify-content: center; gap: 30px; margin-top: 16px; }
        .route-stat-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
        .route-stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .smart-suggestion { background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(34,197,94,0.1)); border: 2px solid var(--accent); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: none; }
        .smart-suggestion.show { display: block; }
        .smart-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-weight: 600; }
        .smart-header i { color: var(--accent); font-size: 1.2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card { background: var(--bg-card); border-radius: 14px; padding: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card.best { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.1); }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.3rem; font-weight: 700; }
        .stat-card.best .stat-value { color: var(--success); }
        .sort-tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .sort-tab { padding: 10px 18px; border-radius: 20px; background: var(--bg-card); border: 1px solid #3f3f46; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .sort-tab.active { background: linear-gradient(135deg, var(--accent), #ea580c); border-color: transparent; color: white; }
        .station-count { color: var(--text-secondary); margin-bottom: 16px; }
        .station-card { background: var(--bg-card); border-radius: 14px; padding: 18px; margin-bottom: 12px; display: flex; gap: 16px; align-items: center; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.3s; }
        .station-card:hover { transform: translateX(6px); border-color: rgba(249,115,22,0.3); }
        .station-card.best { border-left: 3px solid var(--success); background: rgba(34,197,94,0.1); }
        .station-rank { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
        .station-card.best .station-rank { background: var(--success); color: white; }
        .station-info { flex: 1; }
        .station-brand { font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .station-metrics { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        .station-metrics span { display: inline-flex; align-items: center; gap: 4px; margin-right: 12px; }
        .metric-detour { background: rgba(249,115,22,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; }
        .station-price { text-align: right; flex-shrink: 0; }
        .station-price .price { font-size: 1.4rem; font-weight: 700; }
        .price-cheap { color: var(--success); }
        .price-mid { color: #eab308; }
        .price-expensive { color: #ef4444; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header><h1><i class="fas fa-route" style="margin-right:10px;"></i>Route Pulse UK</h1><p>Find the cheapest fuel on your journey</p></header>
        <div class="mode-tabs">
            <button class="mode-tab" onclick="setMode('nearby')"><i class="fas fa-map-marker-alt"></i> Find Nearby</button>
            <button class="mode-tab active" onclick="setMode('route')"><i class="fas fa-road"></i> Plan Route</button>
        </div>
        <div class="input-section">
            <div id="nearbyInputs" style="display:none;">
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-map-marker-alt"></i> Location</label><input type="text" id="postcode" placeholder="e.g. MK14 6BH"></div>
                    <div class="input-group"><label><i class="fas fa-gas-pump"></i> Fuel</label><select id="fuelType"><option value="E10">Petrol</option><option value="E5">Premium</option><option value="B7">Diesel</option></select></div>
                </div>
                <button class="btn" onclick="fetchNearby()"><i class="fas fa-search"></i> Check Prices</button>
            </div>
            <div id="routeInputs">
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-play"></i> From</label><input type="text" id="fromPostcode" placeholder="e.g. MK14 6BH"></div>
                    <div class="input-group"><label><i class="fas fa-flag"></i> To</label><input type="text" id="toPostcode" placeholder="e.g. NW1 4AE"></div>
                    <div class="input-group"><label><i class="fas fa-gas-pump"></i> Fuel</label><select id="routeFuelType"><option value="E10">Petrol</option><option value="E5">Premium</option><option value="B7">Diesel</option></select></div>
                </div>
                <button class="btn" onclick="planRoute()"><i class="fas fa-road"></i> Find Stations</button>
            </div>
        </div>
        <div id="status" class="status"></div>
        <div class="results-section" id="results">
            <div class="route-viz" id="routeViz">
                <div class="route-line"><div class="route-point" id="fromPoint">--</div><span class="route-arrow"><i class="fas fa-long-arrow-alt-right"></i></span><div class="route-point" id="toPoint">--</div></div>
                <div class="route-stats"><div><div class="route-stat-value" id="routeDistance">--</div><div class="route-stat-label">Distance</div></div><div><div class="route-stat-value" id="routeDuration">--</div><div class="route-stat-label">Time</div></div></div>
            </div>
            <div class="smart-suggestion" id="smartSuggestion">
                <div class="smart-header"><i class="fas fa-star"></i><span>Recommended Stop</span></div>
                <div class="smart-body" id="smartBody">Loading...</div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value" id="avgPrice">--</div></div>
                <div class="stat-card best"><div class="stat-label">Cheapest</div><div class="stat-value" id="minPrice">--</div></div>
                <div class="stat-card"><div class="stat-label">vs UK Avg</div><div class="stat-value" id="vsAvg">--</div></div>
                <div class="stat-card"><div class="stat-label">Savings</div><div class="stat-value" id="savings">--</div></div>
            </div>
            <div class="sort-tabs">
                <button class="sort-tab active" onclick="sortStations('price')"><i class="fas fa-tag"></i> Price</button>
                <button class="sort-tab" onclick="sortStations('detour')"><i class="fas fa-route"></i> Detour</button>
                <button class="sort-tab" onclick="sortStations('quickest')"><i class="fas fa-bolt"></i> Quickest</button>
            </div>
            <div class="station-count" id="stationCount">Plan a route to find fuel stations</div>
            <div id="stationList"></div>
        </div>
    </div>
    <script>
        let currentMode = 'route';
        let allStations = [];
        let currentStations = [];
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('nearbyInputs').style.display = mode === 'nearby' ? 'block' : 'none';
            document.getElementById('routeInputs').style.display = mode === 'route' ? 'block' : 'none';
            document.getElementById('results').classList.remove('show');
        }
        
        async function getGeo(postcode) {
            const res = await fetch(`https://api.postcodes.io/postcodes/${postcode.replace(' ', '')}`);
            if (!res.ok) throw new Error('Invalid postcode');
            const data = await res.json();
            return {lat: data.result.latitude, lng: data.result.longitude};
        }
        
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 3959, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        function pointToLineDistance(px, py, line) {
            let minDist = Infinity;
            for (let i = 0; i < line.length-1; i++) {
                const x1 = line[i][0], y1 = line[i][1], x2 = line[i+1][0], y2 = line[i+1][1];
                const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
                const dot = A*C + B*D, lenSq = C*C + D*D;
                const param = lenSq ? dot/lenSq : -1;
                let xx = x1, yy = y1;
                if (param > 1) { xx = x2; yy = y2; }
                else if (param > 0) { xx = x1 + param*C; yy = y1 + param*D; }
                const dx = px - xx, dy = py - yy;
                minDist = Math.min(minDist, Math.sqrt(dx*dx + dy*dy) * 69);
            }
            return minDist;
        }
        
        async function fetchNearby() {
            const postcode = document.getElementById('postcode').value.trim();
            if (!postcode || postcode.length < 5) { showStatus('Enter a valid postcode', 'error'); return; }
            showStatus('Checking prices...', 'loading');
            try {
                const geo = await getGeo(postcode);
                const fuelType = document.getElementById('fuelType').value;
                const url = `https://checkfuelprices.co.uk/api/widget/stations?lat=${geo.lat}&lng=${geo.lng}&fuel=${fuelType}&radius=5&limit=30&sort=price_low`;
                const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();
                allStations = data.stations.map(s => ({
                    brand: s.brand,
                    address: s.address,
                    lat: s.lat,
                    lng: s.lng,
                    price: s.price,
                    distance: s.distance
                }));
                if (allStations.length === 0) { showStatus('No stations found', 'error'); return; }
                updateStats(allStations);
                currentStations = [...allStations].sort((a,b) => a.price - b.price);
                renderStations();
                showStatus(`Found ${allStations.length} stations near ${postcode.toUpperCase()}`, 'success');
                document.getElementById('results').classList.add('show');
                document.getElementById('routeViz').classList.remove('show');
                document.getElementById('smartSuggestion').classList.remove('show');
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }
        
        async function planRoute() {
            const from = document.getElementById('fromPostcode').value.trim();
            const to = document.getElementById('toPostcode').value.trim();
            if (!from || from.length < 5 || !to || to.length < 5) { showStatus('Enter both postcodes', 'error'); return; }
            showStatus('Planning route...', 'loading');
            try {
                const start = await getGeo(from);
                const end = await getGeo(to);
                document.getElementById('fromPoint').textContent = from.toUpperCase();
                document.getElementById('toPoint').textContent = to.toUpperCase();
                document.getElementById('routeViz').classList.add('show');
                const distance = haversineDistance(start.lat, start.lng, end.lat, end.lng);
                const duration = Math.round(distance / 40 * 60);
                document.getElementById('routeDistance').textContent = distance.toFixed(1) + ' mi';
                document.getElementById('routeDuration').textContent = duration + ' min';
                const line = [[start.lng, start.lat], [end.lng, end.lat]];
                const fuelType = document.getElementById('routeFuelType').value;
                const centerLat = (start.lat + end.lat) / 2, centerLng = (start.lng + end.lng) / 2;
                const url = `https://checkfuelprices.co.uk/api/widget/stations?lat=${centerLat}&lng=${centerLng}&fuel=${fuelType}&radius=30&limit=50&sort=price_low`;
                const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
                if (!res.ok) throw new Error('Failed to fetch stations');
                const data = await res.json();
                allStations = (data.stations || []).map(s => {
                    const d = pointToLineDistance(s.lng, s.lat, line);
                    return {
                        brand: s.brand,
                        address: s.address,
                        lat: s.lat,
                        lng: s.lng,
                        price: s.price,
                        distance: s.distance,
                        detour: d,
                        detourTime: Math.round(d * 2)
                    };
                }).filter(s => s.detour <= 5);
                if (allStations.length === 0) { showStatus('No stations along route', 'error'); return; }
                updateStats(allStations);
                allStations.forEach(s => {
                    s.isCheapest = s.price === Math.min(...allStations.map(x => x.price));
                    s.convenienceScore = 150 - (s.detourTime * 3);
                });
                currentStations = [...allStations].sort((a,b) => b.convenienceScore - a.convenienceScore);
                renderStations();
                showSmartSuggestion();
                document.getElementById('results').classList.add('show');
                document.getElementById('smartSuggestion').classList.add('show');
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }
        
        function showSmartSuggestion() {
            const best = currentStations[0];
            if (!best) return;
            const savings = ((140 - best.price) / 100 * 50).toFixed(2);
            document.getElementById('smartBody').innerHTML = `<b>${best.brand}</b> is <b>${best.detourTime} min</b> off route, saves <b>£${savings}</b>`;
        }
        
        function updateStats(stations) {
            const prices = stations.map(s => s.price);
            const avg = prices.reduce((a,b)=>a+b,0)/prices.length;
            const min = Math.min(...prices);
            document.getElementById('avgPrice').textContent = avg.toFixed(1) + 'p';
            document.getElementById('minPrice').textContent = min.toFixed(1) + 'p';
            document.getElementById('vsAvg').textContent = ((min - 138.9) / 138.9 * 100).toFixed(1) + '%';
            document.getElementById('savings').textContent = '£' + ((140 - min) / 100 * 50).toFixed(2);
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.innerHTML = type === 'loading' ? `<div class="spinner"></div><span>${msg}</span>` : `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i><span>${msg}</span>`;
            el.className = 'status ' + type + (type !== 'loading' ? ' show' : '');
        }
        
        function sortStations(criteria) {
            document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (criteria === 'price') currentStations.sort((a,b) => a.price - b.price);
            else if (criteria === 'detour') currentStations.sort((a,b) => a.detour - b.detour);
            else if (criteria === 'quickest') currentStations.sort((a,b) => b.convenienceScore - a.convenienceScore);
            renderStations();
        }
        
        function renderStations() {
            const prices = currentStations.map(s => s.price);
            const minP = Math.min(...prices), maxP = Math.max(...prices);
            document.getElementById('stationCount').textContent = `${currentStations.length} stations found`;
            document.getElementById('stationList').innerHTML = currentStations.map((s, i) => {
                const pc = s.price < minP + (maxP-minP)*0.33 ? 'price-cheap' : s.price < minP + (maxP-minP)*0.66 ? 'price-mid' : 'price-expensive';
                const metrics = currentMode === 'route' ? `<span class="metric-detour"><i class="fas fa-route"></i> ${s.detour?.toFixed(1) || 0} mi / ${s.detourTime || 0} min</span>` : `<span><i class="fas fa-location-arrow"></i> ${(s.distance || 0).toFixed(1)} mi</span>`;
                return `<div class="station-card ${i===0?'best':''}"><div class="station-rank">${i+1}</div><div class="station-info"><div class="station-brand">${s.brand}${i===0?' <i class="fas fa-star" style="color:var(--success)"></i>':''}</div><div class="station-metrics">${metrics}</div></div><div class="station-price"><div class="price ${pc}">${s.price.toFixed(1)}p</div></div></div>`;
            }).join('');
        }
    </script>
</body>
</html>
